name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      # gradle.properties hardcodes a local macOS JDK path; strip it so the
      # JDK set up by actions/setup-java is used instead.
      - name: Strip local JDK path from gradle.properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Build
        run: ./gradlew clean build

      - name: Upload mod jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
