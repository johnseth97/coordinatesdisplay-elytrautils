plugins {
    id 'java'
}

version = project.mod_version
group = project.maven_group
base.archivesName = project.archives_base_name

def prismLibs = "${System.getProperty('user.home')}/Library/Application Support/PrismLauncher/libraries"
def mixinJar = "${prismLibs}/net/fabricmc/sponge-mixin/0.17.2+mixin.0.8.7/sponge-mixin-0.17.2+mixin.0.8.7.jar"

repositories {}

dependencies {
    compileOnly files("${prismLibs}/com/mojang/minecraft/26.1.2/minecraft-26.1.2-client.jar")
    compileOnly files("${prismLibs}/com/mojang/brigadier/1.3.10/brigadier-1.3.10.jar")
    compileOnly files("${prismLibs}/net/fabricmc/fabric-loader/0.19.2/fabric-loader-0.19.2.jar")
    compileOnly files(mixinJar)
    compileOnly files("${prismLibs}/org/slf4j/slf4j-api/2.0.17/slf4j-api-2.0.17.jar")
    annotationProcessor files(mixinJar)
    annotationProcessor files("${prismLibs}/org/ow2/asm/asm/9.9/asm-9.9.jar")
    annotationProcessor files("${prismLibs}/org/ow2/asm/asm-tree/9.9/asm-tree-9.9.jar")
    annotationProcessor files("${prismLibs}/org/ow2/asm/asm-commons/9.9/asm-commons-9.9.jar")
    annotationProcessor files("${prismLibs}/org/ow2/asm/asm-analysis/9.9/asm-analysis-9.9.jar")
    annotationProcessor files("${prismLibs}/org/ow2/asm/asm-util/9.9/asm-util-9.9.jar")
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
    it.options.compilerArgs += ["-Xlint:-options"]
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    archiveFileName = "${archives_base_name}-${version}.jar"
}
