name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      # gradle.properties hardcodes a local macOS JDK path; strip it so the
      # JDK set up by actions/setup-java is used instead.
      - name: Strip local JDK path from gradle.properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      # Cache the MC client jar so it isn't re-downloaded on every run.
      # Key is fixed to the version — the jar never changes for a given release.
      - name: Cache Minecraft client jar
        uses: actions/cache@v4
        with:
          path: .gradle/minecraft
          key: minecraft-26.1.2-client

      - name: Build
        run: ./gradlew clean build

      - name: Upload mod jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: devflags-fabric
          path: build/libs/*.jar
